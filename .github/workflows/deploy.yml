name: Docker Build-Deploy-Run

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup Java
      uses: actions/setup-java@v5
      with:
       distribution: 'corretto'
        java-version: '23'
      
     - name: Build Jar
       run: ./mvnw clean package -DskipTests

     - name: Login to Docker Hub
       run: docker login -u ${{secrets.DOCKER_USERNAME}} --password stdin

     - name: Build the Image
       run: docker -t ${{secrets.DOCKER_USERNAME}}/spring-boot-hello-app:latest

     - name: Push Image to Docker Hub
       run: run: docker push ${{secrets.DOCKER_USERNAME}}/spring-boot-hello-app:latest
       
     - name: SSH and Deploy to EC2
       uses: appleboy/ssh-action@v1
       with:
        host: ${{secrets.HOST}}
        username: ${{secrets.USERNAME}}
        key: ${{secrets.KEY}}
        script: |
          docker stop spring-demo || true
          docker rm spring-demo || true
          docker pull ${{secrets.DOCKER_USERNAME}}/spring-boot-hello-app:latest
          docker run -d --name spring-demo -p 9090:9090 ${{secrets.DOCKER_USERNAME}}/spring-boot-hello-app:latest

      
